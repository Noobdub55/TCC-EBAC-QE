name: CI - UI e API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Testes de API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Executar testes de API
        run: npm test

  ui:
    name: Testes de UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Executar testes de UI
        run: npm run test:ui